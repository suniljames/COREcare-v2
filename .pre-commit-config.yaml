# Pre-commit hooks for COREcare v2.
# Install once locally: `pip install pre-commit && pre-commit install`.
# Run manually:        `pre-commit run --all-files`.
#
# These hooks ARE NOT a substitute for the CI checks at
# .github/workflows/v1-doc-hygiene.yml — they run the same scripts to give
# fast local feedback before push.

repos:
  - repo: local
    hooks:
      - id: v1-doc-hygiene
        name: V1 doc hygiene (PHI / paths / plausible names)
        entry: bash scripts/check-v1-doc-hygiene.sh
        language: system
        files: '^docs/migration/v1-.+\.md$'
        pass_filenames: true

      - id: v1-doc-structure
        name: V1 doc structure (personas / cross-ref header / "needs confirmation" residue / refresh runbook)
        entry: bash scripts/check-v1-doc-structure.sh
        language: system
        # The hook validates the docset as a whole; it fires when any file
        # in the structure script's scope changes — including the migration
        # README (RR-N rule group, #132).
        files: '^docs/migration/(v1-.+|README)\.md$'
        pass_filenames: false

      - id: v1-caption-phi
        name: V1 caption body-scoped placeholder check (CAPTION-STYLE.md §PHI references)
        entry: bash scripts/check-v1-caption-phi.sh
        language: system
        files: '^docs/legacy/v1-ui-catalog/[a-z-]+/[0-9]{3}-.+\.md$'
        pass_filenames: true

      - id: v1-caption-voice
        name: V1 caption voice + format lint (CAPTION-STYLE.md §Voice / §CTAs / §Interaction notes)
        entry: bash scripts/check-v1-caption-voice.sh
        language: system
        files: '^docs/legacy/v1-ui-catalog/[a-z-]+/[0-9]{3}-.+\.md$'
        pass_filenames: true

      # NOTE: check-v1-captions-authored.sh is a whole-catalog gate that
      # cannot run as a pre-commit hook during incremental authoring (it
      # would fail on every commit until the very last TODO is replaced).
      # That gate runs in CI only on the final-acceptance PR and on push to
      # main; locally invoke via `make test-v1-captions-authored`.
