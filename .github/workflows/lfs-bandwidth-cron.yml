name: LFS bandwidth weekly + day-30 reminders

# Replaces the prior one-shot lfs-bandwidth-day30-reminder.yml. Two cron
# entries, both gated to the 2026-05-07 -> 2026-06-07 watch window for
# issue #185.
#
#   - '0 17 * * SAT'  weekly Saturday check-in at 17:00 UTC; gated via
#                     scripts/lib/lfs-watch-window.sh
#   - '0 17 7 6 *'    annual June 7 firing; gated to a hard date check
#                     (only fires on 2026-06-07; subsequent annual
#                     re-fires are no-ops)
#
# Both entries post a different comment body. The weekly check-in nudges
# the operator to read the meter; the day-30 prompt walks them through
# the closure workflow that the auto-closure detector handles.
#
# This file is deleted by the auto-closure detector when the operator
# posts the day-30 report. See docs/operations/lfs-bandwidth-watch.md
# for the runbook.

on:
  schedule:
    - cron: '0 17 * * SAT'
    - cron: '0 17 7 6 *'
  workflow_dispatch: {}

permissions:
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.schedule }}
  cancel-in-progress: false

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine cadence (weekly vs. day-30)
        id: cadence
        run: |
          set -u
          today=$(date -u +%F)
          echo "today=$today" >> "$GITHUB_OUTPUT"

          # Source the shared date-window guard.
          source scripts/lib/lfs-watch-window.sh

          # The day-30 cron entry fires every June 7; only act on 2026-06-07.
          if [[ "${{ github.event.schedule }}" == "0 17 7 6 *" ]]; then
            if [[ "$today" == "2026-06-07" ]]; then
              echo "fire=day30" >> "$GITHUB_OUTPUT"
              echo "REMINDER_FIRED date=$today kind=day30 issue=185"
            else
              echo "Today is $today; day-30 prompt only fires on 2026-06-07. Skipping."
              echo "fire=none" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          # Weekly Saturday entry: gate to the watch window.
          if is_within_window "$today"; then
            anchor="2026-05-07"
            anchor_seconds=$(date -u -j -f "%Y-%m-%d" "$anchor" "+%s" 2>/dev/null \
              || date -u -d "$anchor" "+%s")
            today_seconds=$(date -u -j -f "%Y-%m-%d" "$today" "+%s" 2>/dev/null \
              || date -u -d "$today" "+%s")
            week=$(( (today_seconds - anchor_seconds) / 604800 + 1 ))
            echo "week=$week" >> "$GITHUB_OUTPUT"
            echo "fire=weekly" >> "$GITHUB_OUTPUT"
            echo "REMINDER_FIRED date=$today kind=weekly week=$week issue=185"
          else
            echo "Today $today is outside the watch window 2026-05-07 -> 2026-06-07. Skipping."
            echo "fire=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Post weekly check-in comment
        if: steps.cadence.outputs.fire == 'weekly'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment 185 --repo "${{ github.repository }}" --body "$(cat <<'BODY'
          **Weekly check-in #${{ steps.cadence.outputs.week }} (week of ${{ steps.cadence.outputs.today }})** — read the LFS bandwidth meter at https://github.com/settings/billing → Git LFS Data. If you cross 500 MB cumulative this period, post a yellow-flag comment using the template in the runbook. If your billing reset day falls between this reading and the previous one, report bandwidth for both sides separately (see runbook → "Reset-day caveat").

          Run `scripts/lfs-bandwidth-snapshot.sh` for templates. _Posted automatically by `.github/workflows/lfs-bandwidth-cron.yml`._
          BODY
          )"

      - name: Post day-30 closure prompt
        if: steps.cadence.outputs.fire == 'day30'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment 185 --repo "${{ github.repository }}" --body "$(cat <<'BODY'
          **Day 30 — close out the LFS bandwidth watch**

          The 30-day window for #185 closes today (2026-06-07). Next steps:

          1. Run `scripts/lfs-bandwidth-snapshot.sh` to get the closure template pre-filled with today's date.
          2. Read the bandwidth meter and take the screenshot.
          3. Fill the TBDs in the template and post as a comment on this issue.
          4. Posting the report comment triggers the auto-closure: a PR will open within 60 seconds deleting the watch workflows and closing this issue. Review and merge.
          5. If your report indicates a red flag, an ADR-010 follow-up issue will also be auto-filed for you.

          _Posted automatically by `.github/workflows/lfs-bandwidth-cron.yml`._
          BODY
          )"
