name: V1 Inventory Cold-Reader Rotation

on:
  schedule:
    # Mon 06:00 UTC = 22:00 PT Sunday — drift report waits in the inbox
    # Monday morning. Weekly cadence aligns with the doc-edit pace; nightly
    # would burn cache + cost without signal benefit.
    - cron: '0 6 * * 1'
  workflow_dispatch:
  pull_request:
    paths:
      - 'docs/migration/v1-pages-inventory.md'
      - 'scripts/coldreader/**'
      - '.github/workflows/v1-inventory-coldreader.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  script-self-test:
    name: Coldreader self-test (parser + fixtures + L3 stubs)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Sync coldreader package (frozen)
        working-directory: scripts/coldreader
        run: uv sync --frozen
      - name: Run pytest L1+L2+L3 (no API key needed)
        working-directory: scripts/coldreader
        run: uv run --frozen pytest -q
      - name: Lint
        working-directory: scripts/coldreader
        run: |
          uv run --frozen ruff check .
          uv run --frozen ruff format --check .

  rotation-live:
    name: Cold-reader rotation (live API call)
    if: github.event_name != 'pull_request'
    needs: script-self-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Sync coldreader package (frozen)
        working-directory: scripts/coldreader
        run: uv sync --frozen
      - name: Run rotation (all 7 personas)
        id: rotation
        working-directory: scripts/coldreader
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set +e
          uv run --frozen python run.py
          rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          # Exit codes: 0 PASS, 1 DRIFT, 2 SETUP_ERROR. Surface drift as job failure
          # but keep going so the next step can manage the tracking issue.
          exit 0
      - name: Manage drift tracking issue
        if: always()
        uses: actions/github-script@v7
        env:
          ROTATION_EXIT: ${{ steps.rotation.outputs.exit_code }}
        with:
          script: |
            const exitCode = process.env.ROTATION_EXIT;
            const title = 'chore: v1 inventory cold-reader rotation drift detected';
            const labels = ['documentation', 'coldreader-drift'];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'coldreader-drift',
              per_page: 50,
            });
            const existing = openIssues.find(i => i.title === title) || null;

            if (exitCode === '1') {
              const body = `Drift detected in the weekly cold-reader rotation.\n\n- Run: ${runUrl}\n- See the run's step summary for the failing persona, question, and missing-evidence string.\n\nThis issue is auto-managed: it stays open until a subsequent rotation run passes, at which point it auto-closes.`;
              if (existing) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body,
                });
                core.info(`Appended comment to existing drift issue #${existing.number}`);
              } else {
                const created = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  body,
                  labels,
                });
                core.info(`Opened new drift issue #${created.data.number}`);
              }
              core.setFailed('Cold-reader rotation detected drift.');
            } else if (exitCode === '0' && existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Rotation passed at ${runUrl}. Auto-closing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
              });
              core.info(`Auto-closed previously-open drift issue #${existing.number}`);
            } else if (exitCode === '2') {
              core.setFailed('Cold-reader rotation hit a setup error (parser/fixture/cost guardrail). See logs.');
            }
