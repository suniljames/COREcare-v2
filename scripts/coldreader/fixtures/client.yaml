# Cold-reader rotation for the `## Client` section in
# docs/migration/v1-pages-inventory.md.
#
# Authored fresh — no upstream sub-issue rotation; the Client section
# is intentionally rows-empty because v1 has no Client-as-actor surface.
# These three questions assert that empty-but-explicit contract.
#
# `must_mention` is the validation oracle; `fact_summary` is documentation only.

persona: client
min_section_bytes: 1500

questions:
  - id: q1
    text: >-
      What is the only `User` linkage in v1's `clients/` Django app, and
      what does it bind?
    fact_summary: |
      `class ClientFamilyMember` at `clients/models.py:392` is the only
      `User` linkage in the `clients/` app — its `user = ForeignKey(...)`
      field at `clients/models.py:400` binds a Family Member account to a
      Client record. v1's `class Client(models.Model)` (clients/models.py:15)
      has no `User` linkage of its own; Clients are subjects of care, not
      authenticators. v1 carries zero `@client_required`-style decorators.
    must_mention:
      - ["ClientFamilyMember"]
      - ["Family Member"]
      - ["clients/models.py", "models.py"]
      - ["User", "user"]
    tolerance: 1

  - id: q2
    text: >-
      Where does v1 actually render a client's PHI if Clients themselves
      don't authenticate?
    fact_summary: |
      Under other persona sections — explicitly: the Family Member section
      (linked-client dashboards, billing PDFs, health-report downloads, event
      calendars under `ClientFamilyMember`); Agency Admin → clients (per-client
      unified calendar, custom event creation, attachments, schedule
      PDF/preview); and Agency Admin → charting (per-client charting tab,
      trend views, medication orders, chart-comment review, health-report
      generation/approval, proxy charting). The Client section is faithful
      to v1 and is intentionally empty of rows.
    must_mention:
      - ["Family Member"]
      - ["Agency Admin"]
      - ["ClientFamilyMember"]
      - ["charting"]
      - ["calendar"]
    tolerance: 1

  - id: q3
    text: "Does v2 plan to add an authenticated Client portal? How is that decision tracked?"
    fact_summary: |
      Tracked separately, not decided in this inventory. Issue #109 (labeled
      `needs-pm-input`) tracks whether v2 adds an authenticated Client portal
      as a deliberate divergence from v1, and the implied new Clerk role plus
      per-client RLS policy. This inventory section is faithful to v1 and
      stays rows-empty until that PM decision lands.
    must_mention:
      - ["#109", "issue 109", "Issue 109"]
      - ["needs-pm-input"]
      - ["Clerk", "RLS", "auth", "policy"]
    tolerance: 1
