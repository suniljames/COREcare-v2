# Cold-reader rotation for the `## Agency Admin` section in
# docs/migration/v1-pages-inventory.md.
#
# Three of the five contract questions from #81's authoring DoD —
# the load-bearing ones for v2 portal + RLS design.
#
# `must_mention` is the validation oracle: each OR-group lists acceptable
# surface forms; the model's answer must include at least one alternate from
# each group (within `tolerance` misses). `fact_summary` is documentation
# only — guidance for fixture authors and human readers.

persona: agency-admin
min_section_bytes: 25000

questions:
  - id: q1
    text: "What screens does an Agency Admin see for managing client billing?"
    fact_summary: |
      Agency Admins reach the `### billing` and `### billing_catalogs` apps
      (capability-gated admin custom views and Hazel-managed billable service
      catalog), the per-client schedule PDF/preview under `### clients`, the
      timecard summaries + invoice list + billing exports under `### dashboard`,
      and the QuickBooks OAuth + invoice send + customer linking under
      `### quickbooks_integration`. Multiple Django apps, same persona.
    must_mention:
      - ["billing_catalogs", "billing catalog", "billable service catalog"]
      - ["quickbooks_integration", "QuickBooks", "quickbooks"]
      - ["dashboard"]
      - ["invoice"]
      - ["billing"]
    tolerance: 1

  - id: q2
    text: >-
      What does an Agency Admin see and do across the per-client routes
      under the `### clients` Django app?
    fact_summary: |
      Through the per-client routes mounted at `clients/` and `schedule/`
      under `### clients` — the Agency Admin section authors 11 client-app
      routes covering per-client calendar, events with attachments, schedule
      PDF/preview. Client creation/management flows live within these
      admin-prefixed routes (no Family Member or Caregiver client-management
      surface in v1).
    must_mention:
      - ["clients", "client"]
      - ["calendar"]
      - ["events"]
      - ["schedule"]
      - ["attachments", "PDF"]
    tolerance: 1

  - id: q3
    text: >-
      Which Agency Admin screens need bespoke v2 design treatment because
      they display PHI or sit behind an admin-elevation gate?
    fact_summary: |
      Two distinct categories surface in this section:

      (a) PHI-displaying rows marked `🔒 PHI · ` or carrying
      `phi_displayed=true` in the row table — concentrated in `### charting`
      (clinical surface, 22 routes complete), `### clients` (per-client
      calendar and events with attachments rendering linked-client data),
      `### compliance` (the two authenticated PHI file-stream routes mounted
      at `compliance/files/`), and `### billing` (invoice/payment surfaces).
      The expense-review routes under top-level admin
      (`/admin/expenses/review/...`) carry `phi_displayed=true`.

      (b) RLS-bypass / admin-elevation rows folded into Agency Admin per
      #236 — most notably `/admin/view-as/kill-all/`, the platform-operator
      kill-switch for runaway impersonation sessions. Gated by
      `is_superuser` (Django's stock flag) rather than the Agency Admin
      role grant; audit-logged via the View-As audit trail. v2 must add a
      comparable platform-operator gate distinct from Agency Admin role
      authority.
    must_mention:
      - ["phi_displayed", "PHI displayed", "PHI is displayed", "🔒 PHI"]
      - ["charting"]
      - ["clients"]
      - ["compliance"]
      - ["billing"]
      - ["/admin/view-as/kill-all/", "view-as/kill-all", "kill-all"]
      - ["is_superuser", "superuser"]
    tolerance: 1
