<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812" font-family="Inter, system-ui, -apple-system, sans-serif">
  <title>Client persona — Agency message thread (mobile)</title>
  <desc>Mobile mockup of the Client persona's message thread with the agency: emergency disclaimer banner, agency / self bubbles, and a composer.</desc>

  <rect width="375" height="812" fill="#FFFFFF"/>

  <!-- Status bar -->
  <rect width="375" height="44" fill="#FFFFFF"/>
  <text x="24" y="28" font-size="14" font-weight="600" fill="#1C232C">9:41</text>
  <g transform="translate(320,18)" fill="#1C232C">
    <rect x="0" y="2" width="18" height="10" rx="2" fill="none" stroke="#1C232C" stroke-width="1"/>
    <rect x="2" y="4" width="13" height="6" rx="1"/>
  </g>

  <!-- Header (thread) -->
  <g transform="translate(0,44)">
    <rect width="375" height="64" fill="#FFFFFF"/>
    <text x="24" y="28" font-size="20" font-weight="600" fill="#6A7281">‹</text>
    <circle cx="60" cy="32" r="18" fill="#EDF8F1" stroke="#B3E2C5"/>
    <text x="60" y="38" text-anchor="middle" font-size="13" font-weight="700" fill="#1F6B45">SH</text>
    <text x="88" y="28" font-size="15" font-weight="600" fill="#1C232C">Sunrise Home Care</text>
    <text x="88" y="46" font-size="12" fill="#1F6B45">Office hours: Mon–Fri, 8 AM – 5 PM</text>
    <line x1="0" y1="64" x2="375" y2="64" stroke="#E4E7EB" stroke-width="1"/>
  </g>

  <!-- Emergency disclaimer banner -->
  <g transform="translate(16,124)">
    <rect width="343" height="68" rx="12" fill="#FCF1ED" stroke="#F2D8C6" stroke-width="1"/>
    <g transform="translate(16,18)">
      <circle cx="10" cy="10" r="10" fill="#CB6433"/>
      <text x="10" y="14" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">!</text>
    </g>
    <text x="44" y="28" font-size="13" font-weight="600" fill="#A04A24">Not for emergencies</text>
    <text x="44" y="46" font-size="12" fill="#1C232C">Please call 911 if it's urgent. We reply</text>
    <text x="44" y="60" font-size="12" fill="#1C232C">within one business day.</text>
  </g>

  <!-- Date divider -->
  <g transform="translate(0,212)">
    <line x1="24" y1="10" x2="155" y2="10" stroke="#E4E7EB"/>
    <text x="187.5" y="14" text-anchor="middle" font-size="11" font-weight="500" fill="#6A7281">Tuesday, May 6</text>
    <line x1="220" y1="10" x2="351" y2="10" stroke="#E4E7EB"/>
  </g>

  <!-- Agency bubble 1 -->
  <g transform="translate(16,236)">
    <circle cx="16" cy="16" r="16" fill="#EDF8F1" stroke="#B3E2C5"/>
    <text x="16" y="21" text-anchor="middle" font-size="11" font-weight="700" fill="#1F6B45">SH</text>
    <g transform="translate(40,0)">
      <path d="M0 16 Q0 4 12 4 H224 a8 8 0 0 1 8 8 V60 a8 8 0 0 1 -8 8 H12 Q0 68 0 56 Z" fill="#F3F5F7"/>
      <text x="16" y="24" font-size="13" fill="#1C232C">Hi Eleanor — just confirming</text>
      <text x="16" y="42" font-size="13" fill="#1C232C">Rosa for Wednesday morning,</text>
      <text x="16" y="60" font-size="13" fill="#1C232C">9 AM. Does that still work?</text>
    </g>
    <text x="40" y="84" font-size="11" fill="#6A7281">Janet, RN · 2:14 PM</text>
  </g>

  <!-- Self bubble (right) -->
  <g transform="translate(0,348)">
    <g transform="translate(135,0)">
      <path d="M232 16 Q232 4 220 4 H8 a8 8 0 0 0 -8 8 V40 a8 8 0 0 0 8 8 H220 Q232 48 232 36 Z" fill="#1F6B45"/>
      <text x="16" y="24" font-size="13" fill="#FFFFFF">Yes, that works.</text>
      <text x="16" y="42" font-size="13" fill="#FFFFFF">Thank you!</text>
    </g>
    <text x="345" y="64" text-anchor="end" font-size="11" fill="#6A7281">2:31 PM · Read</text>
  </g>

  <!-- Agency bubble 2 -->
  <g transform="translate(16,432)">
    <circle cx="16" cy="16" r="16" fill="#EDF8F1" stroke="#B3E2C5"/>
    <text x="16" y="21" text-anchor="middle" font-size="11" font-weight="700" fill="#1F6B45">SH</text>
    <g transform="translate(40,0)">
      <path d="M0 16 Q0 4 12 4 H188 a8 8 0 0 1 8 8 V40 a8 8 0 0 1 -8 8 H12 Q0 48 0 36 Z" fill="#F3F5F7"/>
      <text x="16" y="24" font-size="13" fill="#1C232C">Wonderful — we'll see you</text>
      <text x="16" y="42" font-size="13" fill="#1C232C">tomorrow.</text>
    </g>
    <text x="40" y="64" font-size="11" fill="#6A7281">Janet, RN · 2:34 PM</text>
  </g>

  <!-- Date divider: Today -->
  <g transform="translate(0,524)">
    <line x1="24" y1="10" x2="170" y2="10" stroke="#E4E7EB"/>
    <text x="187.5" y="14" text-anchor="middle" font-size="11" font-weight="500" fill="#6A7281">Today</text>
    <line x1="205" y1="10" x2="351" y2="10" stroke="#E4E7EB"/>
  </g>

  <!-- Self bubble (right, today) -->
  <g transform="translate(0,548)">
    <g transform="translate(135,0)">
      <path d="M232 16 Q232 4 220 4 H8 a8 8 0 0 0 -8 8 V58 a8 8 0 0 0 8 8 H220 Q232 66 232 54 Z" fill="#1F6B45"/>
      <text x="16" y="24" font-size="13" fill="#FFFFFF">One quick question — can</text>
      <text x="16" y="42" font-size="13" fill="#FFFFFF">we shift Friday's visit to</text>
      <text x="16" y="60" font-size="13" fill="#FFFFFF">10 AM instead?</text>
    </g>
    <text x="345" y="82" text-anchor="end" font-size="11" fill="#6A7281">9:38 AM · Sent</text>
  </g>

  <!-- Composer -->
  <g transform="translate(0,696)">
    <line x1="0" y1="0" x2="375" y2="0" stroke="#E4E7EB"/>
    <rect width="375" height="64" fill="#FFFFFF"/>
    <rect x="16" y="14" width="295" height="36" rx="18" fill="#F3F5F7" stroke="#E4E7EB"/>
    <text x="32" y="36" font-size="13" fill="#6A7281">Type a message…</text>
    <g transform="translate(323,16)">
      <circle cx="16" cy="16" r="16" fill="#399468"/>
      <path d="M11 16 L21 11 L21 21 Z" fill="#FFFFFF"/>
    </g>
  </g>

  <!-- Bottom tab bar -->
  <g transform="translate(0,760)">
    <rect width="375" height="52" fill="#FFFFFF"/>
    <line x1="0" y1="0" x2="375" y2="0" stroke="#E4E7EB" stroke-width="1"/>
    <g transform="translate(40,8)" fill="none" stroke="#6A7281" stroke-width="2" stroke-linecap="round">
      <path d="M14 8 H30 a2 2 0 0 1 2 2 V24 a2 2 0 0 1 -2 2 H14 a2 2 0 0 1 -2 -2 V10 a2 2 0 0 1 2 -2 Z"/>
      <line x1="16" y1="14" x2="28" y2="14"/>
      <line x1="16" y1="20" x2="24" y2="20"/>
      <text x="22" y="40" text-anchor="middle" font-size="11" font-weight="500" fill="#6A7281" stroke="none">Care plan</text>
    </g>
    <g transform="translate(160,8)" fill="none" stroke="#6A7281" stroke-width="2" stroke-linecap="round">
      <rect x="14" y="6" width="16" height="16" rx="2"/>
      <line x1="14" y1="11" x2="30" y2="11"/>
      <line x1="18" y1="3" x2="18" y2="9"/>
      <line x1="26" y1="3" x2="26" y2="9"/>
      <text x="22" y="40" text-anchor="middle" font-size="11" font-weight="500" fill="#6A7281" stroke="none">Schedule</text>
    </g>
    <!-- Messages (selected) -->
    <g transform="translate(280,8)">
      <rect x="-12" y="-2" width="68" height="36" rx="18" fill="#EDF8F1"/>
      <g fill="none" stroke="#1F6B45" stroke-width="2" stroke-linecap="round">
        <path d="M14 8 H30 a2 2 0 0 1 2 2 V20 a2 2 0 0 1 -2 2 H22 L18 26 V22 H14 a2 2 0 0 1 -2 -2 V10 a2 2 0 0 1 2 -2 Z"/>
      </g>
      <text x="22" y="40" text-anchor="middle" font-size="11" font-weight="600" fill="#1F6B45">Messages</text>
    </g>
  </g>
</svg>
