<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812" font-family="Inter, system-ui, -apple-system, sans-serif">
  <title>Client persona — Upcoming shifts (mobile)</title>
  <desc>Mobile mockup showing the Client persona's schedule: today's caregiver hero, what we'll do, and this week's upcoming visits.</desc>

  <rect width="375" height="812" fill="#FFFFFF"/>

  <!-- Status bar -->
  <rect width="375" height="44" fill="#FFFFFF"/>
  <text x="24" y="28" font-size="14" font-weight="600" fill="#1C232C">9:41</text>
  <g transform="translate(320,18)" fill="#1C232C">
    <rect x="0" y="2" width="18" height="10" rx="2" fill="none" stroke="#1C232C" stroke-width="1"/>
    <rect x="2" y="4" width="13" height="6" rx="1"/>
  </g>

  <!-- Header -->
  <g transform="translate(0,44)">
    <rect width="375" height="76" fill="#FFFFFF"/>
    <circle cx="44" cy="38" r="22" fill="#D4EFDF" stroke="#B3E2C5" stroke-width="1"/>
    <text x="44" y="44" text-anchor="middle" font-size="16" font-weight="600" fill="#1F6B45">EM</text>
    <text x="80" y="34" font-size="12" fill="#6A7281">Hi,</text>
    <text x="80" y="54" font-size="18" font-weight="600" fill="#1C232C">Eleanor</text>
    <g transform="translate(248,22)">
      <rect width="111" height="32" rx="16" fill="#EDF8F1"/>
      <circle cx="16" cy="16" r="6" fill="#399468"/>
      <text x="28" y="20" font-size="12" font-weight="500" fill="#1F6B45">Sunrise Home Care</text>
    </g>
    <line x1="0" y1="76" x2="375" y2="76" stroke="#E4E7EB" stroke-width="1"/>
  </g>

  <!-- Page title -->
  <g transform="translate(24,140)">
    <text x="0" y="0" font-size="24" font-weight="600" fill="#1C232C">Your schedule</text>
    <text x="0" y="22" font-size="13" fill="#6A7281">All times shown in your local time zone</text>
  </g>

  <!-- Hero: today -->
  <g transform="translate(16,196)">
    <rect width="343" height="200" rx="16" fill="#EDF8F1" stroke="#D4EFDF" stroke-width="1"/>
    <text x="20" y="32" font-size="13" font-weight="600" fill="#1F6B45" letter-spacing="0.5">TODAY · WEDNESDAY, MAY 7</text>
    <!-- Caregiver row -->
    <g transform="translate(20,52)">
      <circle cx="28" cy="28" r="28" fill="#DBE9F4"/>
      <text x="28" y="34" text-anchor="middle" font-size="18" font-weight="600" fill="#4495C0">RP</text>
      <text x="76" y="22" font-size="18" font-weight="600" fill="#1C232C">Rosa is coming today</text>
      <text x="76" y="42" font-size="14" fill="#1F6B45" font-weight="500">9:00 AM – 1:00 PM</text>
      <text x="76" y="58" font-size="13" fill="#6A7281">4-hour visit</text>
    </g>
    <!-- Tags -->
    <g transform="translate(20,140)">
      <text x="0" y="0" font-size="11" font-weight="600" fill="#6A7281" letter-spacing="0.5">WHAT WE'LL DO</text>
      <g transform="translate(0,12)">
        <rect width="92" height="28" rx="14" fill="#FFFFFF" stroke="#B3E2C5"/>
        <text x="46" y="18" text-anchor="middle" font-size="12" fill="#1F6B45" font-weight="500">Morning routine</text>
      </g>
      <g transform="translate(100,12)">
        <rect width="86" height="28" rx="14" fill="#FFFFFF" stroke="#B3E2C5"/>
        <text x="43" y="18" text-anchor="middle" font-size="12" fill="#1F6B45" font-weight="500">Light meal prep</text>
      </g>
      <g transform="translate(194,12)">
        <rect width="62" height="28" rx="14" fill="#FFFFFF" stroke="#B3E2C5"/>
        <text x="31" y="18" text-anchor="middle" font-size="12" fill="#1F6B45" font-weight="500">Short walk</text>
      </g>
    </g>
  </g>

  <!-- Section: This week -->
  <g transform="translate(24,420)">
    <text x="0" y="0" font-size="13" font-weight="600" fill="#6A7281" letter-spacing="0.5">THIS WEEK</text>
  </g>

  <g transform="translate(16,440)">
    <!-- Friday -->
    <g>
      <rect width="343" height="80" rx="12" fill="#FFFFFF" stroke="#E4E7EB"/>
      <g transform="translate(20,16)">
        <rect width="48" height="48" rx="10" fill="#F3F5F7"/>
        <text x="24" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#6A7281">FRI</text>
        <text x="24" y="40" text-anchor="middle" font-size="18" font-weight="600" fill="#1C232C">9</text>
      </g>
      <text x="84" y="34" font-size="15" font-weight="600" fill="#1C232C">9:00 AM – 1:00 PM</text>
      <text x="84" y="54" font-size="13" fill="#6A7281">Caregiver: Rosa Park</text>
      <text x="320" y="46" text-anchor="middle" font-size="14" fill="#6A7281">›</text>
    </g>
    <!-- Monday -->
    <g transform="translate(0,92)">
      <rect width="343" height="80" rx="12" fill="#FFFFFF" stroke="#E4E7EB"/>
      <g transform="translate(20,16)">
        <rect width="48" height="48" rx="10" fill="#F3F5F7"/>
        <text x="24" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#6A7281">MON</text>
        <text x="24" y="40" text-anchor="middle" font-size="18" font-weight="600" fill="#1C232C">12</text>
      </g>
      <text x="84" y="34" font-size="15" font-weight="600" fill="#1C232C">9:00 AM – 1:00 PM</text>
      <text x="84" y="54" font-size="13" fill="#6A7281">Caregiver: Rosa Park</text>
      <text x="320" y="46" text-anchor="middle" font-size="14" fill="#6A7281">›</text>
    </g>
    <!-- Wednesday -->
    <g transform="translate(0,184)">
      <rect width="343" height="80" rx="12" fill="#FFFFFF" stroke="#E4E7EB"/>
      <g transform="translate(20,16)">
        <rect width="48" height="48" rx="10" fill="#E5DBF6"/>
        <text x="24" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#7755C2">WED</text>
        <text x="24" y="40" text-anchor="middle" font-size="18" font-weight="600" fill="#7755C2">14</text>
      </g>
      <text x="84" y="34" font-size="15" font-weight="600" fill="#1C232C">11:00 AM – 12:00 PM</text>
      <text x="84" y="54" font-size="13" fill="#7755C2" font-weight="500">Janet, RN — weekly nurse visit</text>
      <text x="320" y="46" text-anchor="middle" font-size="14" fill="#6A7281">›</text>
    </g>
  </g>

  <!-- Bottom tab bar -->
  <g transform="translate(0,760)">
    <rect width="375" height="52" fill="#FFFFFF"/>
    <line x1="0" y1="0" x2="375" y2="0" stroke="#E4E7EB" stroke-width="1"/>
    <!-- Care plan -->
    <g transform="translate(40,8)" fill="none" stroke="#6A7281" stroke-width="2" stroke-linecap="round">
      <path d="M14 8 H30 a2 2 0 0 1 2 2 V24 a2 2 0 0 1 -2 2 H14 a2 2 0 0 1 -2 -2 V10 a2 2 0 0 1 2 -2 Z"/>
      <line x1="16" y1="14" x2="28" y2="14"/>
      <line x1="16" y1="20" x2="24" y2="20"/>
      <text x="22" y="40" text-anchor="middle" font-size="11" font-weight="500" fill="#6A7281" stroke="none">Care plan</text>
    </g>
    <!-- Schedule (selected) -->
    <g transform="translate(160,8)">
      <rect x="-12" y="-2" width="68" height="36" rx="18" fill="#EDF8F1"/>
      <g fill="none" stroke="#1F6B45" stroke-width="2" stroke-linecap="round">
        <rect x="14" y="6" width="16" height="16" rx="2"/>
        <line x1="14" y1="11" x2="30" y2="11"/>
        <line x1="18" y1="3" x2="18" y2="9"/>
        <line x1="26" y1="3" x2="26" y2="9"/>
      </g>
      <text x="22" y="40" text-anchor="middle" font-size="11" font-weight="600" fill="#1F6B45">Schedule</text>
    </g>
    <!-- Messages -->
    <g transform="translate(280,8)" fill="none" stroke="#6A7281" stroke-width="2" stroke-linecap="round">
      <path d="M14 8 H30 a2 2 0 0 1 2 2 V20 a2 2 0 0 1 -2 2 H22 L18 26 V22 H14 a2 2 0 0 1 -2 -2 V10 a2 2 0 0 1 2 -2 Z"/>
      <text x="22" y="40" text-anchor="middle" font-size="11" font-weight="500" fill="#6A7281" stroke="none">Messages</text>
    </g>
  </g>
</svg>
